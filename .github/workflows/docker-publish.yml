name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      enable_upx:
        description: enable UPX compression (true/false)
        required: false
        default: "true"

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/vohive

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            # 总是打上 latest 标签
            type=raw,value=latest,enable=true
            # 语义化精确版本标签 (例如 v1.0.0 会被转换为 1.0.0)
            type=semver,pattern={{version}}

      - name: Prepare build args
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="sha-${GITHUB_SHA::7}"
          fi
          BUILDTIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          REVISION="${GITHUB_SHA}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            ENABLE_UPX_RAW="${{ github.event.inputs.enable_upx }}"
          else
            ENABLE_UPX_RAW="true"
          fi
          case "${ENABLE_UPX_RAW}" in
            false|0|no|off) ENABLE_UPX=0 ;;
            *) ENABLE_UPX=1 ;;
          esac
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "buildtime=${BUILDTIME}" >> "${GITHUB_OUTPUT}"
          echo "revision=${REVISION}" >> "${GITHUB_OUTPUT}"
          echo "enable_upx=${ENABLE_UPX}" >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.github
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            gh_pat=${{ secrets.GH_PAT }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            BUILDTIME=${{ steps.vars.outputs.buildtime }}
            REVISION=${{ steps.vars.outputs.revision }}
            ENABLE_UPX=${{ steps.vars.outputs.enable_upx }}
            GH_PAT=${{ secrets.GH_PAT }}
