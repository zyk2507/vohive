name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (for example v1.2.3)'
        required: true
        type: string
      enable_upx:
        description: 'Enable UPX compression (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write

concurrency:
  group: binary-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  frontend:
    name: Build frontend assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend assets
        shell: bash
        run: |
          npm ci --prefix web
          npm run build --prefix web

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build ${{ matrix.artifact_arch }}
    runs-on: ubuntu-latest
    needs: frontend
    env:
      GOWORK: off
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            goarm: ''
            artifact_arch: amd64
          - goarch: arm64
            goarm: ''
            artifact_arch: arm64
          - goarch: arm
            goarm: '7'
            artifact_arch: armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure Git for private modules
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          if [ -n "${GH_PAT}" ]; then
            git config --global url."https://x-access-token:${GH_PAT}@github.com/${REPOSITORY_OWNER}/".insteadOf "https://github.com/${REPOSITORY_OWNER}/"
            if [ "${REPOSITORY_OWNER}" != "iniwex5" ]; then
              git config --global url."https://x-access-token:${GH_PAT}@github.com/iniwex5/".insteadOf "https://github.com/iniwex5/"
              go env -w GOPRIVATE="github.com/${REPOSITORY_OWNER}/*,github.com/iniwex5/*"
            else
              go env -w GOPRIVATE="github.com/${REPOSITORY_OWNER}/*"
            fi
          fi

      - name: Prepare build vars
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ github.event.inputs.version || 'dev' }}"
          fi
          BUILDTIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          REVISION="${GITHUB_SHA}"
          MODULE_PATH="$(go list -m)"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            ENABLE_UPX_RAW="${{ github.event.inputs.enable_upx }}"
          else
            ENABLE_UPX_RAW="true"
          fi

          case "${ENABLE_UPX_RAW}" in
            false|0|no|off) ENABLE_UPX=0 ;;
            *) ENABLE_UPX=1 ;;
          esac

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "buildtime=${BUILDTIME}" >> "${GITHUB_OUTPUT}"
          echo "revision=${REVISION}" >> "${GITHUB_OUTPUT}"
          echo "enable_upx=${ENABLE_UPX}" >> "${GITHUB_OUTPUT}"
          echo "module_path=${MODULE_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Sync frontend dist for embed
        shell: bash
        run: |
          rm -rf internal/web/dist
          cp -R web/dist internal/web/dist

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} \
            go build -trimpath -buildvcs=false -tags "with_utls" \
            -ldflags "-s -w -X '${{ steps.vars.outputs.module_path }}/internal/global.Version=${{ steps.vars.outputs.version }}' -X '${{ steps.vars.outputs.module_path }}/internal/global.BuildTime=${{ steps.vars.outputs.buildtime }}'" \
            -o dist/vo-hive ./cmd/vohive

      - name: Install UPX
        if: ${{ steps.vars.outputs.enable_upx == '1' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl || sudo apt-get install -y upx

      - name: Compress with UPX
        if: ${{ steps.vars.outputs.enable_upx == '1' }}
        shell: bash
        run: |
          upx --best --lzma dist/vo-hive || upx -9 dist/vo-hive

      - name: Package artifacts
        shell: bash
        run: |
          OUT="vohive_${{ steps.vars.outputs.version }}_linux_${{ matrix.artifact_arch }}"
          mkdir -p out
          cp dist/vo-hive "out/${OUT}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact_arch }}
          path: out/*
          retention-days: 3

  release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      MIRROR_RELEASE_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      - name: Prepare release vars
        id: release_vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_VERSION="${GITHUB_REF_NAME}"
          else
            RELEASE_VERSION="${{ github.event.inputs.version || 'dev' }}"
          fi
          echo "release_version=${RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_vars.outputs.release_version }}
          files: dist/*
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Load source release metadata
        id: source_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_API="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${{ steps.release_vars.outputs.release_version }}"

          release_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${RELEASE_API}")"

          release_name="$(printf '%s' "${release_json}" | jq -r '.name // ""')"
          release_body="$(printf '%s' "${release_json}" | jq -r '.body // ""')"

          {
            echo "release_name<<EOF"
            printf '%s\n' "${release_name}"
            echo "EOF"
            echo "release_body<<EOF"
            printf '%s\n' "${release_body}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish to mirror release repository
        if: ${{ vars.RELEASE_REPOSITORY != '' && env.MIRROR_RELEASE_TOKEN != '' }}
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ vars.RELEASE_REPOSITORY }}
          token: ${{ env.MIRROR_RELEASE_TOKEN }}
          tag_name: ${{ steps.release_vars.outputs.release_version }}
          name: ${{ steps.source_release.outputs.release_name }}
          body: ${{ steps.source_release.outputs.release_body }}
          files: dist/*
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Upload assets to Telegram channel
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHANNEL_ID != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BODY: ${{ steps.source_release.outputs.release_body }}
        shell: bash
        run: |
          set -euo pipefail
          API="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}"

          MESSAGE_HEADER="vohive release ${{ steps.release_vars.outputs.release_version }} assets"
          if [[ -n "${RELEASE_BODY}" ]]; then
            FULL_MESSAGE="${MESSAGE_HEADER}"$'\n\n'"Release notes:"$'\n'"${RELEASE_BODY}"
          else
            FULL_MESSAGE="${MESSAGE_HEADER}"
          fi

          shopt -s nullglob
          FILES=(dist/*)

          if [[ ${#FILES[@]} -eq 0 ]]; then
            MESSAGE="${FULL_MESSAGE:0:3800}"
            curl -fsSL -X POST "${API}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHANNEL_ID}" \
              --data-urlencode "text=${MESSAGE}"
            exit 0
          fi

          # sendMediaGroup 里首个文档携带说明；caption 上限 1024。
          CAPTION="${FULL_MESSAGE:0:1000}"
          CAPTION_JSON="$(jq -Rn --arg s "${CAPTION}" '$s')"

          MEDIA_ITEMS=()
          for i in "${!FILES[@]}"; do
            if [[ "${i}" -eq 0 ]]; then
              MEDIA_ITEMS+=("{\"type\":\"document\",\"media\":\"attach://file${i}\",\"caption\":${CAPTION_JSON}}")
            else
              MEDIA_ITEMS+=("{\"type\":\"document\",\"media\":\"attach://file${i}\"}")
            fi
          done
          MEDIA_JSON="[$(IFS=,; echo "${MEDIA_ITEMS[*]}")]"

          echo "Uploading ${#FILES[@]} binary file(s) to Telegram as one media group..."
          CURL_ARGS=(-fsSL -X POST "${API}/sendMediaGroup" -F "chat_id=${TELEGRAM_CHANNEL_ID}" -F "media=${MEDIA_JSON}")
          for i in "${!FILES[@]}"; do
            CURL_ARGS+=(-F "file${i}=@${FILES[$i]}")
          done
          curl "${CURL_ARGS[@]}"
